<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Órdenes de Trabajo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; background:#0F172A; font-family:'Inter',system-ui,sans-serif; color:#E2E8F0; }
.header { background:linear-gradient(135deg,#1E293B,#0F172A); border-bottom:1px solid #1E293B; padding:18px 28px; display:flex; align-items:center; gap:14px; }
.header-title { font-weight:700; font-size:17px; }
.header-sub { font-size:12px; color:#64748B; }
.header-date { margin-left:auto; font-size:12px; color:#7C4A2A; font-weight:600; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:#334155; margin-left:10px; transition:background 0.3s; flex-shrink:0; }
.layout { display:flex; min-height:calc(100vh - 77px); }
.sidebar { display:none; }
.sidebar-label { font-size:11px; font-weight:600; color:#7C4A2A; letter-spacing:0.08em; margin-bottom:10px; padding-left:8px; }
.tec-btn { width:100%; background:transparent; border:1px solid transparent; border-radius:10px; padding:10px 12px; cursor:pointer; text-align:left; margin-bottom:4px; color:#CBD5E1; }
.tec-btn:hover { background:#1E293B; }
.tec-btn.active { background:#1E3A5F; border-color:rgba(37,99,235,0.25); color:#93C5FD; }
.tec-row { display:flex; justify-content:space-between; margin-bottom:5px; }
.tec-name { font-size:13px; }
.tec-btn.active .tec-name { font-weight:600; }
.tec-count { font-size:11px; color:#64748B; }
.tec-count.done { color:#34D399; }
.prog-track { height:3px; background:#1E293B; border-radius:99px; overflow:hidden; }
.prog-bar { height:100%; border-radius:99px; background:#2563EB; transition:width 0.4s; }
.prog-bar.complete { background:#34D399; }
.main { flex:1; padding:28px 32px; overflow:auto; }
.empty-state { text-align:center; padding-top:80px; color:#334155; }
.empty-state .emoji { font-size:48px; margin-bottom:14px; }
.empty-state h3 { font-size:18px; font-weight:600; }
.tec-header { margin-bottom:22px; }
.tec-header-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.tec-header h2 { font-size:22px; font-weight:700; color:#F1F5F9; }
.tec-stats { margin-top:4px; font-size:13px; color:#64748B; }
.stat-pend { color:#F59E0B; font-weight:600; }
.stat-done { color:#34D399; font-weight:600; }
.stat-completado { cursor:default; user-select:none; }
.ring-wrap { position:relative; width:56px; height:56px; flex-shrink:0; }
.ring-wrap svg { transform:rotate(-90deg); }
.ring-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#94A3B8; }
.dept-filters { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
.dept-btn { padding:4px 12px; border-radius:99px; border:1px solid #1E293B; background:transparent; color:#475569; font-size:12px; font-weight:500; cursor:pointer; }
.orders { display:flex; flex-direction:column; gap:10px; }
.card { background:#1E293B; border:1px solid #334155; border-radius:12px; padding:15px 18px; display:flex; gap:14px; align-items:flex-start; transition:all 0.3s; }
.card.listo { background:#0D1F0D; border-color:#166534; opacity:0.72; }
.ot-num { flex-shrink:0; width:50px; text-align:center; }
.ot-label { font-size:10px; color:#475569; margin-bottom:2px; }
.ot-id { font-size:15px; font-weight:700; color:#F59E0B; }
.card.listo .ot-id { color:#4ADE80; }
.divider { width:1px; background:#334155; align-self:stretch; flex-shrink:0; }
.card-body { flex:1; min-width:0; }
.card-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
.card-title { font-size:14px; font-weight:600; color:#E2E8F0; }
.card.listo .card-title { color:#86EFAC; }
.dept-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; border:1px solid; white-space:nowrap; }
.card-desc { font-size:13px; color:#94A3B8; margin-bottom:6px; line-height:1.45; }
.card-meta { display:flex; gap:14px; font-size:11px; color:#475569; flex-wrap:wrap; }
.meta-done { color:#34D399; }
.btn-listo { padding:8px 14px; background:linear-gradient(135deg,#15803D,#166534); border:1px solid #166534; border-radius:8px; color:#86EFAC; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.btn-deshacer { padding:8px 14px; background:transparent; border:1px solid #334155; border-radius:8px; color:#475569; font-size:12px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.no-orders { color:#475569; text-align:center; padding-top:40px; }
.toast { position:fixed; bottom:24px; right:24px; background:#1E293B; border:1px solid #334155; border-radius:10px; padding:12px 18px; font-size:13px; color:#E2E8F0; box-shadow:0 8px 32px rgba(0,0,0,0.4); transform:translateY(80px); opacity:0; transition:all 0.3s; z-index:998; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:#166534; color:#86EFAC; }
.toast.error { border-color:#991B1B; color:#FCA5A5; }
.toast.info { border-color:#1D4ED8; color:#93C5FD; }
/* Modal Historial */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; align-items:center; justify-content:center; padding:16px; }
.modal-overlay.open { display:flex; }
.modal { background:#1E293B; border:1px solid #334155; border-radius:16px; width:100%; max-width:820px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; }
.modal-header { padding:18px 24px; border-bottom:1px solid #334155; display:flex; align-items:center; justify-content:space-between; }
.modal-title { font-size:15px; font-weight:700; color:#F1F5F9; }
.modal-sub { font-size:12px; color:#64748B; margin-top:2px; }
.modal-close { background:transparent; border:1px solid #334155; border-radius:6px; color:#475569; font-size:16px; cursor:pointer; padding:4px 10px; }
.modal-close:hover { border-color:#EF4444; color:#EF4444; }
.modal-filters { padding:10px 24px; border-bottom:1px solid #1E293B; display:flex; gap:8px; flex-wrap:wrap; }
.modal-body { overflow-y:auto; padding:16px 24px; flex:1; }
.hist-card { background:#0F172A; border:1px solid #1E293B; border-radius:10px; padding:12px 16px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; }
.hist-id { font-size:14px; font-weight:700; color:#34D399; width:44px; flex-shrink:0; text-align:center; }
.hist-id-label { font-size:9px; color:#475569; }
.hist-body { flex:1; min-width:0; }
.hist-title { font-size:13px; font-weight:600; color:#86EFAC; margin-bottom:3px; }
.hist-desc { font-size:12px; color:#64748B; margin-bottom:5px; line-height:1.4; }
.hist-meta { font-size:11px; color:#475569; display:flex; gap:12px; flex-wrap:wrap; }
.hist-done { color:#34D399; }
.no-hist { color:#475569; text-align:center; padding:40px; }
</style>
</head>

// ── Storage helpers ─────────────────────────────────────
function setSyncDot(s){
  const d=document.getElementById("syncDot");
  if(!d) return;
  d.style.background = s==="syncing"?"#F59E0B":s==="ok"?"#34D399":"#334155";
  if(s==="ok") setTimeout(()=>setSyncDot("idle"),2000);
}

function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast "+type+" show";
  setTimeout(()=>{ t.className="toast"; },3500);
}

// ── JSONBin API ─────────────────────────────────────────
async function apiGet(url){ const r=await fetch(url+"/latest",{headers:HEADERS_READ}); if(!r.ok) throw new Error(r.status); return (await r.json()).record; }
async function apiPut(url,data){ const r=await fetch(url,{method:"PUT",headers:HEADERS_WRITE,body:JSON.stringify(data)}); if(!r.ok) throw new Error(r.status); }

// ── Sync main data ──────────────────────────────────────
async function pullFromCloud(){
  try {
    const data = await apiGet(URL_MAIN);
    const incoming = JSON.stringify(data);
    if(incoming===lastHash) return;
    lastHash=incoming;
    if(data.orders&&data.orders.length){ ORDERS=data.orders.filter(function(o){ return o.tec==="Wilberh Rivas"; }); refreshTecnicos(); updateHeader(); }
    if(data.completadas) completadas=data.completadas;
    renderSidebar();
    if(tecActivo) renderMain();
  } catch(_){}
}

async function pushToCloud(){
  setSyncDot("syncing");
  try {
    const current=await apiGet(URL_MAIN);
    const payload={orders:current.orders||[],completadas:current.completadas||{}};
    // Merge Wilber completadas
    Object.keys(completadas).forEach(function(k){ payload.completadas[k]=completadas[k]; });
    lastHash=JSON.stringify(payload);
    await apiPut(URL_MAIN,payload);
    setSyncDot("ok");
  } catch(_){ setSyncDot("idle"); }
}

function schedulePush(){ clearTimeout(syncTimer); syncTimer=setTimeout(pushToCloud,800); }
setInterval(()=>pullFromCloud(),10000);

// ── Historial API ───────────────────────────────────────
async function getHistorial(){ try{ const d=await apiGet(URL_HIST); return d.historial||[]; }catch(_){ return []; } }
async function saveHistorial(hist){ try{ await apiPut(URL_HIST,{historial:hist}); }catch(_){} }

async function archivarOrden(orden,fechaComp){
  const hist = await getHistorial();
  if(hist.find(h=>h.id===orden.id)) return; // ya existe
  hist.unshift({id:orden.id,activo:orden.activo,desc:orden.desc,tec:orden.tec,depto:orden.depto,fecha:orden.fecha,sol:orden.sol,completadoEn:fechaComp});
  await saveHistorial(hist);
}

async function desarchivarOrden(id){
  const hist = await getHistorial();
  await saveHistorial(hist.filter(h=>h.id!==id));
}

// ── Marcar / Desmarcar ──────────────────────────────────
async function marcar(id){
  const fecha=new Date().toLocaleString("es-CR");
  completadas[id]=fecha;
  renderSidebar(); renderMain(); schedulePush();
  // Buscar orden en ORDERS o en BASE_ORDERS filtrado
  var orden=ORDERS.find(function(o){ return o.id===id; });
  if(!orden){
    // Intentar obtener desde cloud
    try {
      const cloudData=await apiGet(URL_MAIN);
      if(cloudData.orders) orden=(cloudData.orders||[]).find(function(o){ return o.id===id; });
    } catch(_){}
  }
  if(orden){
    archivarOrden(orden,fecha);
  }
}

async function desmarcar(id){
  delete completadas[id];
  renderSidebar(); renderMain(); schedulePush();
  desarchivarOrden(id);
}

    return "<button class=\"tec-btn"+(act?" active":"")+"\" onclick=\"selectTec('"+t.replace(/'/g,"\\'")+"')\">"
      +"<div class=\"tec-row\"><span class=\"tec-name\">"+t.split(" ")[0]+"</span>"

// ── Render Main ─────────────────────────────────────────
function renderMain(){
  const el=document.getElementById("mainArea");
  if(!tecActivo){ el.innerHTML="<div class=\"empty-state\"><div class=\"emoji\">👈</div><h3>Selecciona un tecnico</h3><p style=\"font-size:14px;margin-top:4px;\">para ver sus ordenes pendientes</p></div>"; return; }

  const ots=ORDERS.filter(o=>o.tec===tecActivo);
  const pendientes=ots.filter(o=>!completadas[o.id]);
  const listasOts=ots.filter(o=>!!completadas[o.id]);
  const done=listasOts.length;
  const pend=pendientes.length;
  const pct=ots.length?Math.round((done/ots.length)*100):0;
  const circ=2*Math.PI*22;
  const ringColor=pct===100?"#34D399":"#2563EB";
  const enListas=deptoActivo==="__LISTAS__";

  const deptos=["TODOS",...new Set(pendientes.map(o=>o.depto)),"__LISTAS__"];
  const filtered=enListas?[]:deptoActivo==="TODOS"?pendientes:pendientes.filter(o=>o.depto===deptoActivo);

  const deptBtns=deptos.map(function(d){
    const esL=d==="__LISTAS__";
    const label=esL?"Listas ("+listasOts.length+")":d;
    const color=esL?"#34D399":d==="TODOS"?"#2563EB":dc(d);
    const active=deptoActivo===d;
    const style=active?"border-color:"+color+";color:"+color+";background:"+color+"18;":"";
    return "<button class=\"dept-btn"+(active?" active-dept":"")+"\" style=\""+style+"\" onclick=\"selectDepto('"+d+"')\">"+label+"</button>";
  }).join("");

  function cardHtml(o,esListo){
    const color=dc(o.depto);
    const btn=esListo
      ?"<button class=\"btn-deshacer\" onclick=\"desmarcar("+o.id+")\">Deshacer</button>"
      :"<button class=\"btn-listo\" onclick=\"marcar("+o.id+")\">✓ Marcar listo</button>";
    const metaDone=esListo?"<span class=\"meta-done\">✅ "+completadas[o.id]+"</span>":"";
    return "<div class=\"card"+(esListo?" listo":"")+"\">"
      +"<div class=\"ot-num\"><div class=\"ot-label\">OT</div><div class=\"ot-id\">"+o.id+"</div></div>"
      +"<div class=\"divider\"></div>"
      +"<div class=\"card-body\">"
      +"<div class=\"card-title-row\"><span class=\"card-title\">"+(esListo?"✓ ":"")+o.activo+"</span>"
      +"<span class=\"dept-tag\" style=\"color:"+color+";border-color:"+color+"40;background:"+color+"18\">"+o.depto+"</span></div>"
      +"<div class=\"card-desc\">"+o.desc+"</div>"
      +"<div class=\"card-meta\"><span>📅 "+o.fecha+"</span><span>👤 "+o.sol+"</span>"+metaDone+"</div>"
      +"</div>"+btn+"</div>";
  }

  const cards=enListas
    ?(listasOts.length?listasOts.map(o=>cardHtml(o,true)).join(""):"<div class=\"no-orders\">No hay ordenes listas aun</div>")
    :(filtered.length?filtered.map(o=>cardHtml(o,false)).join(""):"<div class=\"no-orders\">No hay ordenes pendientes aqui</div>");

  el.innerHTML="<div class=\"tec-header\">"
    +"<div class=\"tec-header-top\"><div>"
    +"<h2>"+tecActivo+"</h2>"
    +"<div class=\"tec-stats\">"
    +"<span class=\"stat-pend\">"+pend+"</span> pendientes · "
    +"<span class=\"stat-done\">"+done+"</span> listas · "
    +pct+"% <span class=\"stat-completado\" onclick=\"abrirHistorial('"+tecActivo.replace(/'/g,"\\'")+"')\">completado</span>"
    +"</div></div>"
    +"<div class=\"ring-wrap\"><svg width=\"56\" height=\"56\"><circle cx=\"28\" cy=\"28\" r=\"22\" fill=\"none\" stroke=\"#1E293B\" stroke-width=\"5\"/>"
    +"<circle cx=\"28\" cy=\"28\" r=\"22\" fill=\"none\" stroke=\""+ringColor+"\" stroke-width=\"5\" stroke-dasharray=\""+circ+"\" stroke-dashoffset=\""+(circ*(1-pct/100))+"\" stroke-linecap=\"round\"/>"
    +"</svg><div class=\"ring-label\">"+pct+"%</div></div></div>"
    +"<div class=\"dept-filters\">"+deptBtns+"</div></div>"
    +"<div class=\"orders\">"+cards+"</div>";
}

// ── Importar Excel ──────────────────────────────────────
function importarExcel(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try {
      const wb=XLSX.read(ev.target.result,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!rows.length){ showToast("El archivo esta vacio","error"); return; }
      const keys=Object.keys(rows[0]);
      function find(){
        const cs=Array.prototype.slice.call(arguments);
        return keys.find(function(k){ return cs.some(function(c){ return k.toLowerCase().indexOf(c)>=0; }); })||"";
      }
      const colId=find("numero","solicitud","id","ot");
      const colActivo=find("activo","equipo","nombre");
      const colDesc=find("descripcion","desc");
      const colTec=find("asignado","tecnico");
      const colDepto=find("departamento","depto","area");
      const colFecha=find("fecha","date");
      const colSol=find("solicitado","solicitante","por");
      if(!colId||!colTec){ showToast("No se reconoce el formato","error"); return; }
      const nueva=[];
      rows.forEach(function(r){
        const id=parseInt(r[colId]);
        if(!id||isNaN(id)) return;
        nueva.push({id:id,activo:String(r[colActivo]||"Sin nombre").trim(),desc:String(r[colDesc]||r[colActivo]||"").trim(),tec:String(r[colTec]||"Sin asignar").trim(),depto:String(r[colDepto]||"GENERAL").trim().toUpperCase(),fecha:String(r[colFecha]||"").trim(),sol:String(r[colSol]||"").trim()});
      });
      if(!nueva.length){ showToast("No se encontraron ordenes validas","error"); return; }
      // Archivar listas que ya no estan
      const idsNuevos=new Set(nueva.map(function(o){ return o.id; }));
      const aArchivar=ORDERS.filter(function(o){ return !idsNuevos.has(o.id)&&completadas[o.id]; });
      if(aArchivar.length){
        const hist=await getHistorial();
        aArchivar.forEach(function(o){
          if(!hist.find(function(h){ return h.id===o.id; })){
            hist.unshift({id:o.id,activo:o.activo,desc:o.desc,tec:o.tec,depto:o.depto,fecha:o.fecha,sol:o.sol,completadoEn:completadas[o.id]});
          }
        });
        await saveHistorial(hist);
      }
      // Limpiar completadas que ya no existen
      Object.keys(completadas).forEach(function(k){ if(!idsNuevos.has(parseInt(k))) delete completadas[k]; });
      ORDERS=nueva;
      await pushToCloud();
      refreshTecnicos();
      if(tecActivo&&TECNICOS.indexOf(tecActivo)<0){ tecActivo=null; deptoActivo="TODOS"; }
      updateHeader(); renderSidebar(); renderMain();
      showToast("✅ "+ORDERS.length+" ordenes cargadas y sincronizadas");
    } catch(err){ showToast("Error: "+err.message,"error"); }
    e.target.value="";
  };
  reader.readAsArrayBuffer(file);
}

// ── Historial Modal ─────────────────────────────────────
async function abrirHistorial(tec){
  document.getElementById("modalHistorial").classList.add("open");
  document.getElementById("modalTecNombre").textContent=tec;
  document.getElementById("modalBody").innerHTML="<div class=\"no-hist\">Cargando...</div>";
  document.getElementById("modalFiltros").innerHTML="";
  histFiltro="TODOS";
  const hist=await getHistorial();
  const tecHist=hist.filter(function(o){ return o.tec===tec; });
  renderModalHistorial(tecHist);
}

function renderModalHistorial(tecHist){
  const deptos=["TODOS",...new Set(tecHist.map(function(o){ return o.depto; }))];
  const filtered=histFiltro==="TODOS"?tecHist:tecHist.filter(function(o){ return o.depto===histFiltro; });
  document.getElementById("modalFiltros").innerHTML=deptos.map(function(d){
    const color=d==="TODOS"?"#2563EB":dc(d);
    const active=histFiltro===d;
    const style=active?"border-color:"+color+";color:"+color+";background:"+color+"18;":"";
    return "<button class=\"dept-btn"+(active?" active-dept":"")+"\" style=\""+style+"\" onclick=\"histFiltrar('"+d+"')\">"+d+"</button>";
  }).join("");
  if(!filtered.length){ document.getElementById("modalBody").innerHTML="<div class=\"no-hist\">No hay ordenes completadas aqui</div>"; return; }
  document.getElementById("modalBody").innerHTML=filtered.map(function(o){
    const color=dc(o.depto);
    return "<div class=\"hist-card\">"
      +"<div class=\"hist-id\"><div class=\"hist-id-label\">OT</div>"+o.id+"</div>"
      +"<div class=\"hist-body\"><div class=\"hist-title\">✓ "+o.activo+"</div>"
      +"<div class=\"hist-desc\">"+o.desc+"</div>"
      +"<div class=\"hist-meta\">"
      +"<span style=\"color:"+color+";font-weight:600;font-size:10px;padding:1px 6px;border-radius:99px;border:1px solid "+color+"40;background:"+color+"18\">"+o.depto+"</span>"
      +"<span>📅 "+o.fecha+"</span><span>👤 "+o.sol+"</span>"
      +"<span class=\"hist-done\">✅ "+o.completadoEn+"</span>"
      +"</div></div></div>";
  }).join("");
}

function histFiltrar(d){ histFiltro=d; document.getElementById("modalHistorial").classList.remove("open"); abrirHistorial(document.getElementById("modalTecNombre").textContent); }
function cerrarHistorial(){ document.getElementById("modalHistorial").classList.remove("open"); }
