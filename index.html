<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Órdenes de Trabajo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height:100vh; background:#0F172A; font-family:'Inter',system-ui,sans-serif; color:#E2E8F0; }

  .header {
    background:linear-gradient(135deg,#1E293B 0%,#0F172A 100%);
    border-bottom:1px solid #1E293B;
    padding:18px 32px; display:flex; align-items:center; gap:14px;
  }
  .header-icon {
    width:40px; height:40px;
    background:linear-gradient(135deg,#F59E0B,#EF4444);
    border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .header-title { font-weight:700; font-size:18px; letter-spacing:-0.3px; }
  .header-sub { font-size:12px; color:#64748B; }
  .header-date { margin-left:auto; font-size:12px; color:#7C4A2A; font-weight:600; }



  .layout { display:flex; min-height:calc(100vh - 77px); }

  .sidebar { width:220px; background:#0F172A; border-right:1px solid #1E293B; padding:22px 12px; flex-shrink:0; }
  .sidebar-label { font-size:11px; font-weight:600; color:#7C4A2A; letter-spacing:0.08em; margin-bottom:10px; padding-left:8px; }
  .tec-btn { width:100%; background:transparent; border:1px solid transparent; border-radius:10px; padding:10px 12px; cursor:pointer; text-align:left; margin-bottom:4px; transition:all 0.15s; color:#CBD5E1; }
  .tec-btn:hover { background:#1E293B; }
  .tec-btn.active { background:#1E3A5F; border-color:rgba(37,99,235,0.25); color:#93C5FD; }
  .tec-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
  .tec-name { font-size:13px; }
  .tec-btn.active .tec-name { font-weight:600; }
  .tec-count { font-size:11px; color:#64748B; }
  .tec-count.done { color:#34D399; }
  .prog-track { height:3px; background:#1E293B; border-radius:99px; overflow:hidden; }
  .prog-bar { height:100%; border-radius:99px; background:#2563EB; transition:width 0.4s ease; }
  .prog-bar.complete { background:#34D399; }

  .main { flex:1; padding:28px 32px; overflow:auto; }
  .empty-state { text-align:center; padding-top:80px; color:#334155; }
  .empty-state .emoji { font-size:48px; margin-bottom:14px; }
  .empty-state h3 { font-size:18px; font-weight:600; }
  .empty-state p { font-size:14px; margin-top:4px; }

  .tec-header { margin-bottom:22px; }
  .tec-header-top { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .tec-header h2 { font-size:22px; font-weight:700; color:#F1F5F9; }
  .tec-stats { margin-top:4px; font-size:13px; color:#64748B; }
  .stat-pend { color:#F59E0B; font-weight:600; }
  .stat-done { color:#34D399; font-weight:600; }

  .ring-wrap { position:relative; width:56px; height:56px; flex-shrink:0; }
  .ring-wrap svg { transform:rotate(-90deg); }
  .ring-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#94A3B8; }

  .dept-filters { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .dept-btn { padding:4px 12px; border-radius:99px; border:1px solid #1E293B; background:transparent; color:#475569; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; }

  .orders { display:flex; flex-direction:column; gap:10px; }
  .card { background:#1E293B; border:1px solid #334155; border-radius:12px; padding:15px 18px; display:flex; gap:14px; align-items:flex-start; transition:all 0.3s ease; }
  .card.listo { background:#0D1F0D; border-color:#166534; opacity:0.72; }
  .ot-num { flex-shrink:0; width:50px; text-align:center; }
  .ot-label { font-size:10px; color:#475569; margin-bottom:2px; }
  .ot-id { font-size:15px; font-weight:700; color:#F59E0B; }
  .card.listo .ot-id { color:#4ADE80; }
  .divider { width:1px; background:#334155; align-self:stretch; flex-shrink:0; }
  .card-body { flex:1; min-width:0; }
  .card-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
  .card-title { font-size:14px; font-weight:600; color:#E2E8F0; }
  .card.listo .card-title { color:#86EFAC; }
  .dept-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:99px; border:1px solid; white-space:nowrap; }
  .card-desc { font-size:13px; color:#94A3B8; margin-bottom:6px; line-height:1.45; }
  .card-meta { display:flex; gap:14px; font-size:11px; color:#475569; flex-wrap:wrap; }
  .meta-done { color:#34D399; }

  .btn-listo { padding:8px 14px; background:linear-gradient(135deg,#15803D,#166534); border:1px solid #166534; border-radius:8px; color:#86EFAC; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.15s; flex-shrink:0; }
  .btn-listo:hover { background:linear-gradient(135deg,#16A34A,#15803D); }
  .btn-deshacer { padding:8px 14px; background:transparent; border:1px solid #334155; border-radius:8px; color:#475569; font-size:12px; cursor:pointer; white-space:nowrap; transition:all 0.15s; flex-shrink:0; }
  .btn-deshacer:hover { border-color:#EF4444; color:#EF4444; }
  .no-orders { color:#475569; text-align:center; padding-top:40px; }

  .toast { position:fixed; bottom:24px; right:24px; background:#1E293B; border:1px solid #334155; border-radius:10px; padding:12px 18px; font-size:13px; color:#E2E8F0; box-shadow:0 8px 32px rgba(0,0,0,0.4); transform:translateY(80px); opacity:0; transition:all 0.3s ease; z-index:999; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { border-color:#166534; color:#86EFAC; }
  .toast.error { border-color:#991B1B; color:#FCA5A5; }
  .toast.info { border-color:#1D4ED8; color:#93C5FD; }
</style>
</head>

const JSONBIN_URL = "https://api.jsonbin.io/v3/b/" + JSONBIN_ID;

let syncTimeout = null;
let lastSyncedHash = "";

function hashData(obj) { return JSON.stringify(obj); }

function setSyncDot(state) {
  const dot = document.getElementById("syncDot");
  if (!dot) return;
  if (state==="syncing") dot.style.background="#F59E0B";
  else if (state==="ok")  dot.style.background="#34D399";

async function pullFromCloud() {
  try {
    const r = await fetch(JSONBIN_URL + "/latest", {
      headers: { "X-Master-Key": JSONBIN_KEY }
    });
    if (!r.ok) return;
    const data = (await r.json()).record;

      updateHeader();

    }
    renderSidebar();
    if (tecActivo) renderMain();
  } catch(_) {}
}

async function pushToCloud() {
  try {
    const payload = { orders: ORDERS, completadas };
    lastSyncedHash = hashData(payload);
    await fetch(JSONBIN_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
      body: JSON.stringify(payload)
    });
    setSyncDot("ok");
  } catch(_) { setSyncDot("idle"); }
}

function schedulePush() {
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(pushToCloud, 800);
}

      </div>

  }).join("");
}

// ── Render Main ────────────────────────────────────────
function renderMain() {
  const el = document.getElementById("mainArea");
  if (!tecActivo) {
    el.innerHTML=`<div class="empty-state"><div class="emoji">👈</div><h3>Seleccioná un técnico</h3><p>para ver sus órdenes pendientes</p></div>`;
    return;
  }
  const ots      = ORDERS.filter(o=>o.tec===tecActivo);
  const done     = ots.filter(o=>completadas[o.id]).length;
  const pend     = ots.length - done;
  const pct      = ots.length ? Math.round((done/ots.length)*100) : 0;
  // Separar pendientes y listas
  const pendientes = ots.filter(o=>!completadas[o.id]);
  const listas     = ots.filter(o=>!!completadas[o.id])
    .sort((a,b)=>{
      const da = new Date(completadas[a.id].split(' ').reverse().join(' '));
      const db = new Date(completadas[b.id].split(' ').reverse().join(' '));
      return db - da;
    });

  const deptos    = ["TODOS", ...new Set(pendientes.map(o=>o.depto)), "__LISTAS__"];
  const circ      = 2*Math.PI*22;
  const offset    = circ*(1-pct/100);
  const ringColor = pct===100?"#34D399":"#2563EB";
  const enListas  = deptoActivo==="__LISTAS__";

  const filtered = enListas ? [] :
    deptoActivo==="TODOS" ? pendientes : pendientes.filter(o=>o.depto===deptoActivo);

  const deptBtns = deptos.map(d=>{
    const esL   = d==="__LISTAS__";
    const label = esL ? "Listas (" + listas.length + ")" : d;
    const color = esL ? "#34D399" : (d==="TODOS" ? "#2563EB" : dc(d));
    const active= deptoActivo===d;
    const style = active ? "border-color:"+color+";color:"+color+";background:"+color+"18;" : "";
    return '<button class="dept-btn'+(active?" active-dept":"")+'" style="'+style+'" onclick="selectDepto(\'' + d + '\')">' + label + '</button>';
  }).join("");

  function cardHtml(o, esListo) {
    const color    = dc(o.depto);
    const btn      = esListo
      ? '<button class="btn-deshacer" onclick="desmarcar(' + o.id + ')">Deshacer</button>'
      : '<button class="btn-listo" onclick="marcar(' + o.id + ')">✓ Marcar listo</button>';
    const metaDone = esListo ? '<span class="meta-done">✅ ' + completadas[o.id] + '</span>' : "";
    return '<div class="card' + (esListo?" listo":"") + '" id="card-' + o.id + '">'
      + '<div class="ot-num"><div class="ot-label">OT</div><div class="ot-id">' + o.id + '</div></div>'
      + '<div class="divider"></div>'
      + '<div class="card-body">'
      + '<div class="card-title-row">'
      + '<span class="card-title">' + (esListo?"✓ ":"") + o.activo + '</span>'
      + '<span class="dept-tag" style="color:'+color+';border-color:'+color+'40;background:'+color+'18">' + o.depto + '</span>'
      + '</div>'
      + '<div class="card-desc">' + o.desc + '</div>'
      + '<div class="card-meta"><span>📅 ' + o.fecha + '</span><span>👤 ' + o.sol + '</span>' + metaDone + '</div>'
      + '</div>' + btn + '</div>';
  }

  const cards = enListas
    ? (listas.length ? listas.map(o=>cardHtml(o,true)).join("") : '<div class="no-orders">No hay órdenes listas aún</div>')
    : (filtered.length ? filtered.map(o=>cardHtml(o,false)).join("") : '<div class="no-orders">No hay órdenes pendientes aquí</div>');

  el.innerHTML=`
    <div class="tec-header">
      <div class="tec-header-top">
        <div>
          <h2>${tecActivo}</h2>
          <div class="tec-stats">
            <span class="stat-pend">${pend}</span> pendientes ·
            <span class="stat-done">${done}</span> listas · ${pct}% completado
          </div>
        </div>
        <div class="ring-wrap">
          <svg width="56" height="56">
            <circle cx="28" cy="28" r="22" fill="none" stroke="#1E293B" stroke-width="5"/>
            <circle cx="28" cy="28" r="22" fill="none" stroke="${ringColor}" stroke-width="5"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
              stroke-linecap="round" style="transition:stroke-dashoffset 0.5s ease"/>
          </svg>
          <div class="ring-label">${pct}%</div>
        </div>
      </div>
      <div class="dept-filters">${deptBtns}</div>
    </div>
    <div class="orders">${cards}</div>`;
}

function selectTec(t)    { tecActivo=t; deptoActivo="TODOS"; renderSidebar(); renderMain(); }
function selectDepto(d)  { deptoActivo=d; renderMain(); }

function marcar(id) {
  completadas[id]=new Date().toLocaleString("es-CR");
  saveCompletadas(); renderSidebar(); renderMain();
  setSyncDot("syncing"); schedulePush();
}
function desmarcar(id) {
  delete completadas[id];
  saveCompletadas(); renderSidebar(); renderMain();
  setSyncDot("syncing"); schedulePush();
}

// ── Importar Excel (reemplaza lista completa) ──────────
function importarExcel(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try {
      const wb   = XLSX.read(ev.target.result,{type:"array"});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!rows.length){ showToast("El archivo está vacío","error"); return; }

      const keys=Object.keys(rows[0]);
      function find(...cs){ return keys.find(k=>cs.some(c=>k.toLowerCase().includes(c)))||""; }
      const colId    =find("número","numero","solicitud","id","ot");
      const colActivo=find("activo","equipo","nombre");
      const colDesc  =find("descripción","descripcion","desc");
      const colTec   =find("asignado","tecnico","técnico");
      const colDepto =find("departamento","depto","área","area");
      const colFecha =find("fecha","date");
      const colSol   =find("solicitado","solicitante","por");

      if(!colId||!colTec){ showToast("No se reconoce el formato del Excel","error"); return; }

      // Construir nueva lista completa desde el Excel
      const nuevaLista=[];
      rows.forEach(r=>{
        const id=parseInt(r[colId]);
        if(!id||isNaN(id)) return;
        nuevaLista.push({
          id,
          activo:String(r[colActivo]||"Sin nombre").trim(),
          desc  :String(r[colDesc]||r[colActivo]||"").trim(),
          tec   :String(r[colTec]||"Sin asignar").trim(),
          depto :String(r[colDepto]||"GENERAL").trim().toUpperCase(),
          fecha :String(r[colFecha]||"").trim(),
          sol   :String(r[colSol]||"").trim(),
        });
      });

      if(!nuevaLista.length){ showToast("No se encontraron órdenes válidas","error"); return; }

      // Limpiar completadas que ya no existen
      const idsNuevos=new Set(nuevaLista.map(o=>o.id));
      Object.keys(completadas).forEach(k=>{ if(!idsNuevos.has(parseInt(k))) delete completadas[k]; });

      // Reemplazar lista
      ORDERS=nuevaLista;
      saveOrders();
      saveCompletadas();
      refreshTecnicos();

      // Si el técnico activo ya no existe, deseleccionar
      if(tecActivo && !TECNICOS.includes(tecActivo)){ tecActivo=null; deptoActivo="TODOS"; }

      updateHeader();
      renderSidebar();
      renderMain();
      setSyncDot("syncing"); pushToCloud();
      showToast(`✅ Lista actualizada — ${ORDERS.length} órdenes cargadas`);
    } catch(err){ showToast("Error al leer el archivo: "+err.message,"error"); }
    e.target.value="";
  };
  reader.readAsArrayBuffer(file);
}



// ── Init ───────────────────────────────────────────────
pullFromCloud();
renderSidebar();
</script>
